<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juicy's Boost</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======= BANNIÈRE EN HAUT ======= -->
<div id="banniere">
<img src="banniere.png" alt="Juicy Boost">
</div>

<!-- ======= CONTENU PRINCIPAL ======= -->
<div id="contenu">

<!-- COLONNE GAUCHE : lien Discord -->
<div id="discord-box">
<div id="discord-inner">
<img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" style="width:50px; margin-bottom:8px;">
<p>Rejoins le serveur</p>
<a id="discord-link" href="https://discord.gg/dAVkRzYAH" target="_blank">
Cliquez ici pour rejoindre
</a>
</div>
</div>

<!-- COLONNE CENTRE : file d'attente -->
<div id="file-box">
<h2>🎯 File d'attente</h2>
<div id="liste-container">
<ul id="liste-file">
<li id="liste-vide">Personne pour l'instant...</li>
</ul>
</div>
</div>

<!-- COLONNE DROITE : prix -->
<div id="prix-box">
<h2>💰 Tarifs Boost</h2>

<div class="prix-section">
<h3>🏅 Ranked</h3>
<div class="prix-item">
<span class="prix-label">Jusqu'à Mythique</span>
<span class="prix-valeur">5€</span>
</div>
<div class="prix-item">
<span class="prix-label">Mythique → Légendaire</span>
<span class="prix-valeur">5€ / rank</span>
</div>
<div class="prix-item highlight">
<span class="prix-label">Mythique → Légendaire (pack)</span>
<span class="prix-valeur">12€</span>
</div>
</div>

<div class="prix-section">
<h3>🪜 Ladder</h3>
<div class="prix-item">
<span class="prix-label">0 → 1 000 pts</span>
<span class="prix-valeur">5€</span>
</div>
<div class="prix-item">
<span class="prix-label">1 000 → 2 000 pts</span>
<span class="prix-valeur">10€</span>
</div>
</div>

<div class="prix-paiement">
💳 Paiement via <strong>PayPal</strong> uniquement
</div>
</div>

</div>

<!-- ======= BOUTON EN BAS À GAUCHE ======= -->
<button id="btn-rejoindre" onclick="rejoindreFile()">
🔴 Rejoindre la file d'attente
</button>

<!-- ======= TIKTOK EN BAS À DROITE ======= -->
<div style="position:fixed; bottom:18px; right:18px; z-index:999; text-align:center;">
<div style="
font-family: 'Arial Black', sans-serif;
font-size: 13px;
font-weight: 900;
letter-spacing: 2px;
background: linear-gradient(90deg, #00cfff, #0066cc, #00cfff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 5px;
text-transform: uppercase;
">TikTok</div>
<a href="https://www.tiktok.com/@juicy03402" target="_blank" style="display:inline-block; opacity:0.6; transition: opacity 0.2s;">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0 0 4px #00cfff);">
<path fill="#00cfff" d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
</svg>
</a>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
